# TDSQL数据库SQL审核工具 v1.0.2 — Nginx 反向代理配置（可选中间件）
# 用途: TLS 终止 + 统一 443 入口。不使用 Nginx 时应用可直接以 8000 端口提供服务。
# 安装: 麒麟V10SP3 内网源 `yum install -y nginx`，本文件放至 /etc/nginx/conf.d/sqlcheck.conf
# 证书: 替换下方 ssl_certificate* 为行内签发的证书路径

server {
    listen 80;
    server_name sqlcheck.example.bank;          # 按行内域名修改
    return 301 https://$host$request_uri;       # 强制 HTTPS
}

server {
    listen 443 ssl;
    server_name sqlcheck.example.bank;

    ssl_certificate     /etc/nginx/certs/sqlcheck.crt;
    ssl_certificate_key /etc/nginx/certs/sqlcheck.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20m;                   # SQL文件上传上限
    gzip on;
    gzip_types text/css application/javascript application/json;

    # 长耗时接口（processlist 轮询扫描最长60s + EXPLAIN）
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;             # 操作审计记录真实IP依赖此头
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /metrics 仅允许监控网段拉取（按行内 Prometheus 地址修改）
    location /metrics {
        allow 10.0.0.0/8;    # 示例：监控网段
        deny all;
        proxy_pass http://127.0.0.1:8000/metrics;
    }
}

# 启用 Nginx 后建议:
# 1) systemd 单元中 --host 0.0.0.0 改为 --host 127.0.0.1（仅本机回环，出口收敛到 Nginx）
# 2) firewalld 仅放通 443，收回 8000
